<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
      <!-- Preload assets to ensure textures are available -->
    <a-assets>
      <img id="sky1" src="assets/beach copy.jpg">
      <img id="ball" src="assets/BeachBallTexture1.jpg">
      <img id="rainbow" src="assets/rainbow.jpg">
      <img id="plane" src="assets/plane.jpg">
    </a-assets>
    <a-scene>
      <a-sphere src="#ball" position="-2 1.25 -5" radius="1.25"></a-sphere>
      <a-cone rotation="180 0 0" position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cone>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <a-sky src="#sky1" color="#ECECEC"></a-sky>
      <a-sphere src="#rainbow" position="1 1.5 -3" radius=".83" height="1.5"></a-sphere>
    </a-scene>
  </body>
</html>
