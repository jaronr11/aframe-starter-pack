<!DOCTYPE html>
<html>
  <head>
    <title>Your A-Frame Sandbox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="main.css">
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sphere position="0 1.25 -5" radius="1.25" color="white"></a-sphere>
      <a-sphere position="0 3.2 -5" radius="1" color="white"></a-sphere>
      <a-sphere position="0 4.8 -5" radius=".75" color="white"></a-sphere>
      <a-sphere position=".2 5 -4.3" radius=".1" color="black"></a-sphere>
      <a-sphere position="-.2 5 -4.3" radius=".1" color="black"></a-sphere>
      <a-cone position="0 4.7 -4.3" rotation="90" radius-top=".1" radius-bottom=".3" color="orange"></a-cone>

      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset: forest; dressingAmount: 500; skyType:color; skyColor:white; groundColor:white"></a-entity>
      <a-entity camera look-controls position="0 3 0"></a-entity>
      </a-scene>
